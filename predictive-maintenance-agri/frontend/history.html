<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historique | Irrigation Intelligence Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #020617;
            --card-bg: rgba(15, 23, 42, 0.7);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --primary: #3b82f6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            background-color: var(--bg);
            background-image: url('static/bg.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 4rem 2rem;
        }

        body::before {
            content: ''; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at 50% 50%, rgba(2, 6, 23, 0.4) 0%, rgba(2, 6, 23, 0.9) 100%);
            z-index: -1;
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 2.5rem;
            width: 100%;
            max-width: 1000px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .btn-back {
            display: inline-flex; align-items: center; gap: 8px;
            color: var(--text-dim); text-decoration: none; font-weight: 600;
            margin-bottom: 2rem; transition: color 0.2s;
        }
        .btn-back:hover { color: #fff; }

        table { width: 100%; border-collapse: collapse; text-align: left; margin-top: 1rem; }
        th { padding: 1rem; border-bottom: 1px solid var(--glass-border); font-weight: 600; color: var(--text-dim); }
        td { padding: 1.2rem 1rem; border-bottom: 1px solid rgba(255,255,255,0.02); }
        tr:hover td { background: rgba(255,255,255,0.02); }

        .btn-clear {
            background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.3);
            padding: 0.6rem 1.2rem; border-radius: 12px; cursor: pointer; font-weight: 600;
            transition: all 0.2s;
        }
        .btn-clear:hover { background: rgba(239, 68, 68, 0.2); }
    </style>
</head>
<body>

    <div class="glass-card">
        <a href="/" class="btn-back"><i class="fa-solid fa-arrow-left"></i> Retour au Diagnostic</a>
        
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
            <h1 style="font-size: 1.8rem;"><i class="fa-solid fa-clock-rotate-left" style="color: var(--primary);"></i> Historique Complet</h1>
            <button id="clear-history" class="btn-clear">Vider l'historique</button>
        </div>

        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>Heure</th>
                        <th>ID Équipement</th>
                        <th>Temp.</th>
                        <th>Vibration</th>
                        <th>Risque</th>
                        <th>État</th>
                    </tr>
                </thead>
                <tbody id="history-table-body">
                    <!-- Dynamic -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const historyTableBody = document.getElementById('history-table-body');
        
        function renderHistory() {
            let predictionHistory = JSON.parse(localStorage.getItem('diag_history')) || [];
            historyTableBody.innerHTML = '';
            
            if (predictionHistory.length === 0) {
                historyTableBody.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 3rem; color: var(--text-dim);">Aucun historique enregistré. Lancez un diagnostic pour commencer.</td></tr>';
                return;
            }

            predictionHistory.forEach(item => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="color: var(--text-dim);">${item.time}</td>
                    <td style="font-weight: 600;">${item.id}</td>
                    <td style="color: #cbd5e1;">${item.temp}°C</td>
                    <td style="color: #cbd5e1;">${item.vib} mm/s</td>
                    <td style="color: ${item.color}; font-weight: 800; font-size: 1.1rem;">${Math.round(item.prob)}%</td>
                    <td>
                        <span style="background: ${item.color}20; color: ${item.color}; padding: 0.4rem 1rem; border-radius: 99px; font-size: 0.8rem; font-weight: 700; border: 1px solid ${item.color}40;">
                            ${item.etat}
                        </span>
                    </td>
                `;
                historyTableBody.appendChild(tr);
            });
        }

        renderHistory();

        document.getElementById('clear-history').addEventListener('click', () => {
            if(confirm('Êtes-vous sûr de vouloir vider l\'historique ?')) {
                localStorage.removeItem('diag_history');
                renderHistory();
            }
        });
    </script>
</body>
</html>
